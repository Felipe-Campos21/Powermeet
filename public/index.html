<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerMeet</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<!-- ── Setup overlay (primeira execução) ── -->
<div id="setup-overlay" class="setup-overlay hidden">
  <div class="setup-card">
    <div class="setup-logo">
      <img src="img/logo.png" alt="PowerMeet" style="height:90px;object-fit:contain" />
    </div>
    <p class="setup-subtitle">O Software Contábil que Parametriza Automaticamente o Movimento da sua Empresa</p>
    <div class="setup-step">
      <h3>Bem-vindo ao PowerMeet</h3>
      <p>Escolha onde os dados serão salvos.<br>
         <strong>Dica:</strong> Salve em uma pasta do OneDrive para acessar de qualquer máquina.</p>
      <div class="setup-path-row">
        <input type="text" id="setup-db-path" placeholder="Caminho da pasta..." readonly />
        <button class="btn-primary" onclick="setupChooseFolder()">Escolher Pasta</button>
      </div>
      <button class="btn-confirm" id="setup-confirm" onclick="setupConfirm()" disabled>Iniciar PowerMeet</button>
    </div>
  </div>
</div>

<!-- ── App principal ── -->
<div id="app" class="app-layout hidden">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="img/logo.png" alt="PowerMeet" style="width:160px;object-fit:contain" />
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="conciliacao">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        Conciliação
      </a>
      <a href="#" class="nav-item" data-page="importar">
        <svg viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        Importar Extrato
      </a>
      <a href="#" class="nav-item" data-page="parametros">
        <svg viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
        Parâmetros
      </a>
      <a href="#" class="nav-item" data-page="empresas">
        <svg viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        Empresas
      </a>
      <a href="#" class="nav-item" data-page="agrupamentos">
        <svg viewBox="0 0 24 24"><path d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
        Agrupamentos
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-toggle-btn" onclick="App.toggleSidebar()" title="Recolher menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="version" id="app-version">v1.0.0</span>
    </div>
  </aside>

  <!-- Botão flutuante para reabrir sidebar -->
  <button class="sidebar-reopen-btn hidden" id="sidebar-reopen-btn" onclick="App.toggleSidebar()" title="Abrir menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
  </button>

  <!-- Conteúdo principal -->
  <main class="main-content" id="page-content">
    <!-- injetado pelo JS -->
  </main>

</div>

<script src="js/api.js"></script>
<script src="js/pages/setup.js"></script>
<script src="js/pages/conciliacao.js"></script>
<script src="js/pages/importar.js"></script>
<script src="js/pages/parametros.js"></script>
<script src="js/pages/empresas.js"></script>
<script src="js/pages/agrupamentos.js"></script>
<script src="js/app.js"></script>
</body>
</html>
